<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bayyina — Qiroat: matn + test PARALLEL (DEMO)</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{ --bg:#0e1621; --panel:#17212b; --accent:#2b5278; --accent2:#34618c; --green:#1f6f43; --red:#7a2b2b; --txt:#e9eef3; --mut:#7d8fa0; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;}
  .app{display:flex;flex-direction:column;height:100vh;max-width:1200px;margin:0 auto;}
  /* header */
  .top{background:var(--panel);padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #0b1320;flex-wrap:wrap;}
  .ttl{font-size:15px;font-weight:700;}
  .ttl small{display:block;color:var(--mut);font-weight:400;font-size:12px;}
  .timer{margin-left:auto;background:#0e1621;border:1px solid #2b3b4d;border-radius:20px;padding:6px 14px;font-weight:700;font-variant-numeric:tabular-nums;}
  .timer.warn{color:#ffb347;border-color:#6b4b1a;}
  /* tabs (mobil) */
  .tabs{display:none;background:var(--panel);border-bottom:1px solid #0b1320;}
  .tabs button{flex:1;background:none;border:none;color:var(--mut);padding:12px;font-size:14px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;}
  .tabs button.active{color:#6ab3f3;border-bottom-color:#6ab3f3;}
  /* split body */
  .body{flex:1;display:flex;min-height:0;}
  .pane{min-height:0;overflow:auto;}
  .reader{flex:1.15;background:#2a2a2a;display:flex;flex-direction:column;border-right:1px solid #0b1320;}
  .r-bar{background:#1f1f1f;padding:6px 10px;display:flex;gap:8px;align-items:center;font-size:13px;flex-wrap:wrap;}
  .r-bar button{background:#3a3a3a;color:#fff;border:none;border-radius:7px;padding:6px 10px;cursor:pointer;}
  .r-bar button:hover{background:#4a4a4a;}
  .r-bar input{width:42px;text-align:center;border:none;border-radius:6px;padding:4px;}
  .canvas-wrap{flex:1;overflow:auto;display:flex;justify-content:center;padding:12px;}
  #pdfCanvas{background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:100%;height:auto;}
  .test{flex:1;background:var(--bg);padding:16px;}
  .q{background:var(--panel);border-radius:14px;padding:14px;margin-bottom:14px;border:1px solid #22303f;}
  .q .qn{font-size:12px;color:#6ab3f3;font-weight:700;margin-bottom:6px;}
  .q .qt{font-size:15px;line-height:1.5;margin-bottom:10px;}
  .opt{display:block;background:#0e1621;border:1.5px solid #2b3b4d;border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer;font-size:14px;transition:.12s;}
  .opt:hover{border-color:var(--accent2);}
  .opt.sel{border-color:#6ab3f3;background:#13283d;}
  .opt.correct{border-color:#3fb068;background:#11331f;}
  .opt.wrong{border-color:#d65d5d;background:#331414;}
  .opt input{margin-left:0;margin-right:8px;}
  .ar{direction:rtl;font-family:"Amiri","Traditional Arabic",serif;font-size:20px;}
  .submit{width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;}
  .submit:hover{background:#258050;}
  .submit:disabled{opacity:.5;cursor:not-allowed;}
  /* result */
  .result{display:none;text-align:center;padding:30px 16px;}
  .result.show{display:block;}
  .score-ring{font-size:44px;font-weight:800;margin:10px 0;}
  .pass{color:#3fb068;} .fail{color:#d65d5d;}
  .result p{color:var(--mut);}
  .result button{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;}
  .loading{color:#bbb;text-align:center;padding:40px;width:100%;}
  /* MOBIL */
  @media(max-width:840px){
    .tabs{display:flex;}
    .body{position:relative;}
    .pane{position:absolute;inset:0;display:none;}
    .pane.active{display:flex;}
    .reader{border-right:none;}
    .test{display:block;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="ttl">📄 Qiroat — 1-dars <small>Matnni o'qing va savollarga javob bering</small></div>
    <div class="timer" id="timer">10:00</div>
  </div>

  <div class="tabs">
    <button id="tabRead" class="active" onclick="showPane('read')">📖 Matn</button>
    <button id="tabTest" onclick="showPane('test')">📝 Savollar (<span id="ansCount">0</span>/3)</button>
  </div>

  <div class="body">
    <!-- READER -->
    <div class="pane reader active" id="paneRead">
      <div class="r-bar">
        <button onclick="gotoPage(curPage-1)">◀</button>
        <button onclick="gotoPage(curPage+1)">▶</button>
        <span>Bet <input id="pageInput" type="number" min="1" onchange="gotoPage(+this.value)"> / <span id="pageTotal">?</span></span>
        <button onclick="zoom(0.2)">＋</button>
        <button onclick="zoom(-0.2)">－</button>
      </div>
      <div class="canvas-wrap"><canvas id="pdfCanvas"></canvas><div class="loading" id="loadingMsg">Yuklanmoqda…</div></div>
    </div>

    <!-- TEST -->
    <div class="pane test" id="paneTest">
      <div id="quizArea"></div>
      <button class="submit" id="submitBtn" disabled onclick="submitQuiz()">Natijani yuborish</button>
      <div class="result" id="resultBox"></div>
    </div>
  </div>
</div>

  // bet = matnning qaysi betida javob bor (ixtiyoriy ko'rsatma)

    let opt='';
    item.opts.forEach((o,oi)=>{
      const arc=item.ar?' ar':'';
      opt+=`<label class="opt${arc}" data-q="${qi}" data-o="${oi}">
              <input type="radio" name="q${qi}" value="${oi}"> ${o}</label>`;
    });
    box.innerHTML=`<div class="qn">SAVOL ${qi+1}${item.bet?` · 📄 ${item.bet}-betga qarang`:''}</div>

    area.appendChild(box);
  });
  area.addEventListener('change',e=>{
    if(e.target.type!=='radio')return;
    const qi=+e.target.name.slice(1); answers[qi]=+e.target.value;
    document.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(l=>l.classList.remove('sel'));

    document.getElementById('ansCount').textContent=Object.keys(answers).length;
    document.getElementById('submitBtn').disabled=Object.keys(answers).length<QUESTIONS.length;
  });

  function submitQuiz(){
    let correct=0;
    QUESTIONS.forEach((item,qi)=>{
      document.querySelectorAll(`.opt[data-q="${qi}"]`).forEach(l=>{
        l.style.pointerEvents='none';
        const oi=+l.dataset.o;

        else if(answers[qi]===oi)l.classList.add('wrong');
      });

  async function gotoPage(n){
    if(!pdfDoc)return; n=Math.max(1,Math.min(pdfDoc.numPages,n));
    if(rendering){pend=n;return;} rendering=true;curPage=n;
